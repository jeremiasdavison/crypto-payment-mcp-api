<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Prices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .timestamp {
      font-size: 11px;
      color: #484848;
    }

    /* ── PRICE GRID ── */
    .price-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }

    .price-card {
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 14px 13px;
      transition: border-color 0.15s;
    }
    .price-card:hover { border-color: #404040; }

    .token-symbol {
      font-size: 13px;
      font-weight: 700;
      color: #c0c0c0;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }

    .token-price {
      font-size: 19px;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.1;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .change-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 5px;
    }
    .up      { background: rgba(34,197,94,0.13);  color: #22c55e; }
    .down    { background: rgba(239,68,68,0.11);  color: #ef4444; }
    .neutral { background: #252525; color: #666; border: 1px solid #333; }

    /* ── SOURCE ── */
    .source-row {
      margin-top: 14px;
      font-size: 11px;
      color: #333;
      text-align: right;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      color: #444;
      font-size: 13px;
      gap: 10px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #2a2a2a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span>Fetching prices…</span>
  </div>

  <div id="content" style="display:none">
    <div class="header">
      <h1>📈 Crypto Prices</h1>
      <span id="timestamp" class="timestamp"></span>
    </div>
    <div id="grid" class="price-grid"></div>
    <div id="source" class="source-row"></div>
  </div>

  <script>
    function formatPrice(price, currency) {
      const sym = (currency || "usd").toUpperCase() === "USD" ? "$" : (currency || "").toUpperCase() + "\u00a0";
      if (price >= 1000) return sym + price.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (price >= 1)    return sym + price.toFixed(4);
      return sym + price.toFixed(6);
    }

    function normalizeTokens(data) {
      if (Array.isArray(data.items)) return data.items;
      return [];
    }

    function renderData(data) {
      const tokens = normalizeTokens(data);
      if (!tokens.length) return;

      // Timestamp
      if (data.timestamp) {
        const d = new Date(data.timestamp);
        document.getElementById("timestamp").textContent =
          "Updated " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      // Price cards
      document.getElementById("grid").innerHTML = tokens.map(t => {
        const ch  = t.change24h;
        let cls   = "neutral";
        let icon  = "–";
        if (ch > 0)  { cls = "up";   icon = "▲"; }
        if (ch < 0)  { cls = "down"; icon = "▼"; }

        return `
          <div class="price-card">
            <div class="token-symbol">${t.symbol}</div>
            <div class="token-price">${formatPrice(t.price, t.currency)}</div>
            <span class="change-badge ${cls}">${icon} ${Math.abs(ch || 0).toFixed(2)}%</span>
          </div>
        `;
      }).join("");

      if (data.source) {
        document.getElementById("source").textContent = `via ${data.source}`;
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
    }

    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== "object") return;
      if (msg.method === "ui/notifications/tool-result") {
        const data = msg.params?.structuredContent;
        if (data) renderData(data);
      }
    });
  </script>
</body>
</html>
