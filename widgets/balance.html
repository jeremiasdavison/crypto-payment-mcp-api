<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Balances</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn {
      background: #252525;
      border: 1px solid #383838;
      color: #888;
      border-radius: 6px;
      padding: 5px 11px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .refresh-btn:hover { background: #2e2e2e; color: #ccc; border-color: #484848; }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; pointer-events: none; }

    /* ── SUMMARY BADGES ── */
    .summary {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .badge-green { background: rgba(34,197,94,0.14); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
    .badge-gray  { background: #232323; color: #777; border: 1px solid #333; }
    .badge-red   { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.18); }

    /* ── NETWORK CARDS ── */
    .network-grid { display: flex; flex-direction: column; gap: 7px; }

    .network-card {
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.15s;
    }
    .network-card.funded { border-color: rgba(34,197,94,0.25); }
    .network-card.offline { opacity: 0.45; }

    .card-left { display: flex; align-items: center; gap: 10px; }

    .network-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .network-name {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      line-height: 1.3;
    }
    .network-address {
      font-size: 11px;
      color: #555;
      font-family: 'SF Mono', 'Consolas', monospace;
      margin-top: 1px;
    }

    .card-right { text-align: right; flex-shrink: 0; }

    .balance-amount {
      font-size: 14px;
      font-weight: 600;
      color: #888;
    }
    .balance-amount.funded { color: #22c55e; }

    .token-label { font-size: 11px; color: #555; margin-left: 3px; font-weight: 400; }

    .status-hint {
      font-size: 10px;
      color: #444;
      margin-top: 2px;
    }
    .faucet-link {
      font-size: 10px;
      color: #3b82f6;
      text-decoration: none;
      margin-top: 3px;
      display: block;
      transition: color 0.1s;
    }
    .faucet-link:hover { color: #60a5fa; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 13px;
      font-size: 11px;
      color: #3a3a3a;
      text-align: center;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      color: #444;
      font-size: 13px;
      gap: 10px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #2a2a2a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span>Scanning wallets…</span>
  </div>

  <div id="content" style="display:none">
    <div class="header">
      <h1>⛓ Network Balances</h1>
      <button class="refresh-btn" id="refresh-btn" onclick="refresh()">↻ Refresh</button>
    </div>
    <div id="summary" class="summary"></div>
    <div id="grid" class="network-grid"></div>
    <div id="footer" class="footer"></div>
  </div>

  <script>
    const NETWORK_COLORS = {
      "Base Sepolia":      "#0052ff",
      "Ethereum Sepolia":  "#627eea",
      "Optimism Sepolia":  "#ff0420",
      "Arbitrum Sepolia":  "#28a0f0",
      "Polygon Amoy":      "#8247e5",
      "Scroll Sepolia":    "#e5b07a",
    };

    function shortAddr(addr) {
      if (!addr) return "—";
      return addr.slice(0, 6) + "…" + addr.slice(-4);
    }

    function renderData(data) {
      const all = [
        ...(data.walletsWithFunds || []),
        ...(data.emptyWallets || []),
        ...(data.offlineWallets || []),
      ];

      const r = data.summary || {};
      const summaryEl = document.getElementById("summary");
      summaryEl.innerHTML = `
        <span class="badge badge-green">✓ ${r.withFunds || 0} with funds</span>
        <span class="badge badge-gray">◯ ${r.empty || 0} empty</span>
        ${(r.offline || 0) > 0
          ? `<span class="badge badge-red">⚠ ${r.offline} offline</span>`
          : ""}
      `;

      // Network cards
      document.getElementById("grid").innerHTML = all.map(n => {
        const color    = NETWORK_COLORS[n.network] || "#555";
        const hasFunds = n.status === "con_saldo";
        const isOffline = n.status === "sin_conexion" || n.status === "error";
        const cardCls  = hasFunds ? "funded" : isOffline ? "offline" : "";
        const bal      = n.balance != null ? Number(n.balance) : null;

        return `
          <div class="network-card ${cardCls}">
            <div class="card-left">
              <div class="network-dot" style="background:${color}"></div>
              <div>
                <div class="network-name">${n.network}</div>
                <div class="network-address">${shortAddr(n.address)}</div>
              </div>
            </div>
            <div class="card-right">
              ${bal != null
                ? `<div class="balance-amount ${hasFunds ? 'funded' : ''}">${bal.toFixed(4)}<span class="token-label">${n.token}</span></div>`
                : `<div class="balance-amount">—</div>`}
              ${hasFunds  ? '<div class="status-hint">✓ funded</div>' : ""}
              ${isOffline ? '<div class="status-hint" style="color:#6b2020">offline</div>' : ""}
              ${!hasFunds && !isOffline && n.faucet
                ? `<a class="faucet-link" href="${n.faucet}" target="_blank">↗ get testnet ${n.token}</a>`
                : ""}
            </div>
          </div>
        `;
      }).join("");

      document.getElementById("footer").textContent =
        `${r.total_redes || all.length} networks · testnet only`;

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
    }

    function refresh() {
      document.getElementById("loading").style.display = "flex";
      document.getElementById("content").style.display = "none";
      window.parent.postMessage({
        jsonrpc: "2.0",
        method: "tools/call",
        params: { name: "scan_testnet_balances", arguments: {} },
      }, "*");
    }

    // Listen for data from ChatGPT Apps SDK
    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== "object") return;
      if (msg.method === "ui/notifications/tool-result") {
        const data = msg.params?.structuredContent;
        if (data) renderData(data);
      }
    });
  </script>
</body>
</html>
