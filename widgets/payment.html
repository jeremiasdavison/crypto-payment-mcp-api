<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── HEADER ── */
    .header { margin-bottom: 14px; }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── AMOUNT CARD ── */
    .amount-card {
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 22px 16px 18px;
      margin-bottom: 9px;
      text-align: center;
    }

    .amount-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    .amount-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
    }

    .amount-value {
      font-size: 40px;
      font-weight: 800;
      color: #f0f0f0;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .amount-token {
      font-size: 18px;
      font-weight: 500;
      color: #666;
    }

    /* ── DETAILS LIST ── */
    .details-list {
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      border-bottom: 1px solid #272727;
    }
    .detail-row:last-child { border-bottom: none; }

    .detail-key {
      font-size: 13px;
      color: #666;
    }

    .detail-val {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Consolas', monospace;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-val.plain { font-family: inherit; }

    /* ── STATUS BADGE ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(251,191,36,0.13);
      color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.2);
    }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .btn-confirm {
      background: #22c55e;
      color: #000;
    }
    .btn-cancel {
      background: #252525;
      color: #888;
      border: 1px solid #383838;
    }

    /* ── DRY RUN NOTE ── */
    .dryrun-note {
      font-size: 11px;
      color: #3a3a3a;
      text-align: center;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      color: #444;
      font-size: 13px;
      gap: 10px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #2a2a2a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span>Preparing payment…</span>
  </div>

  <div id="content" style="display:none">
    <div class="header">
      <h1>💳 Payment Review</h1>
    </div>

    <div class="amount-card">
      <div class="amount-label">Sending</div>
      <div class="amount-row">
        <span id="amount-value" class="amount-value">—</span>
        <span id="amount-token" class="amount-token">—</span>
      </div>
    </div>

    <div class="details-list">
      <div class="detail-row">
        <span class="detail-key">To</span>
        <span id="to-addr" class="detail-val">—</span>
      </div>
      <div id="row-original" class="detail-row">
        <span class="detail-key">ENS / Alias</span>
        <span id="to-original" class="detail-val plain">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Est. Gas</span>
        <span id="gas" class="detail-val plain">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Status</span>
        <span id="status" class="status-badge">⏳ Pending approval</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-confirm" onclick="confirmPayment()">Confirm</button>
      <button class="btn btn-cancel"  onclick="cancelPayment()">Cancel</button>
    </div>

    <div class="dryrun-note">⚠ Simulation mode — no real transaction sent</div>
  </div>

  <script>
    function shortAddr(addr) {
      if (!addr || addr.length <= 14) return addr || "—";
      return addr.slice(0, 8) + "…" + addr.slice(-6);
    }

    function renderData(data) {
      document.getElementById("amount-value").textContent = data.amount ?? "—";
      document.getElementById("amount-token").textContent = data.token  || "";
      document.getElementById("to-addr").textContent      = shortAddr(data.to);
      document.getElementById("gas").textContent          = data.estimated_gas || "—";

      // Show ENS/alias row only if different from resolved address
      const orig = data.to_original;
      if (orig && orig !== data.to) {
        document.getElementById("to-original").textContent = orig;
      } else {
        document.getElementById("row-original").style.display = "none";
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
    }

    function confirmPayment() {
      // Send follow-up to ChatGPT conversation
      window.openai?.sendFollowUpMessage?.("Confirm and send this payment.");
    }

    function cancelPayment() {
      window.openai?.requestClose?.();
    }

    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (!msg || typeof msg !== "object") return;
      if (msg.method === "ui/notifications/tool-result") {
        const data = msg.params?.structuredContent;
        if (data) renderData(data);
      }
    });
  </script>
</body>
</html>
